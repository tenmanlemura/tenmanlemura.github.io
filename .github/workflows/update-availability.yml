name: Update availability JSON

on:
  schedule:
    # 6 時間毎の補強更新。dispatch 失敗時のセーフティネット。
    - cron: '0 */6 * * *'
  repository_dispatch:
    # update-availability: 一般トリガー（外部から curl で kick 可能）
    types: [update-availability]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-availability
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute start_monday (JST)
        id: monday
        run: |
          # GNU date / BSD date 両対応で JST 今週月曜を計算
          if date -d "now" +%Y-%m-%d > /dev/null 2>&1; then
            START_MONDAY=$(TZ=Asia/Tokyo date -d "this monday" +%Y-%m-%d 2>/dev/null \
              || TZ=Asia/Tokyo date -d "last monday" +%Y-%m-%d)
          else
            START_MONDAY=$(TZ=Asia/Tokyo date -v -Mon +%Y-%m-%d)
          fi
          echo "start_monday=${START_MONDAY}" >> "$GITHUB_OUTPUT"
          echo "Computed start_monday: ${START_MONDAY}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate availability from VPS API
        env:
          START_MONDAY: ${{ steps.monday.outputs.start_monday }}
          WEEK_COUNT: '8'
        run: |
          set -e
          node scripts/generate-availability.mjs

      - name: Commit and push if changed
        run: |
          if [[ -z "$(git status --porcelain schedule/data/weeks/)" ]]; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add schedule/data/weeks/
          git commit -m "data: update availability $(TZ=Asia/Tokyo date +%Y-%m-%dT%H:%M%z)"
          git push
