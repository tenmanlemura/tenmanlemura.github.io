<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理画面 - 占いサロン予約管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="./style.css?v=20260614b">
</head>
<body data-page="admin">
  <div class="auth-gate" id="authGate" role="status" aria-live="polite">
    認証状態を確認しています
  </div>

  <div class="app-shell admin-app" id="appShell" hidden>
    <header class="admin-header">
      <h1>占いサロン予約管理</h1>
      <span class="user-chip" id="currentUserEmail" hidden></span>
    </header>

    <div class="admin-degraded-wrap">
      <div class="alert-banner degraded-banner" id="degraded-banner" hidden role="alert">
        現在、Firestore 無料枠が上限に近づいているため安全モードに切り替えています。書込操作は明日 00:30 JST 以降に自動復帰します。読込は通常通り利用できます。
      </div>
    </div>

    <main class="admin-main">
      <section class="tab-panel" id="tab-home" data-tab-panel="home" role="tabpanel" aria-labelledby="tab-button-home">
        <div class="tab-home-loading" id="homeTabSpinner" role="status">読み込み中...</div>
      </section>

      <section class="tab-panel" id="panel-settings" data-tab-panel="settings" role="tabpanel" aria-labelledby="tab-settings" hidden>
        <div class="tab-home-loading" role="status">読み込み中...</div>
      </section>
    </main>

    <nav class="admin-tabbar" aria-label="管理メニュー" role="tablist">
      <button type="button" class="admin-tab" id="tab-button-home" data-tab="home" role="tab" aria-controls="tab-home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9.5L12 3l9 6.5"></path><path d="M5 10v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V10"></path></svg>
        <span>ホーム</span>
      </button>
      <button type="button" class="admin-tab" id="tab-settings" data-tab="settings" role="tab" aria-controls="panel-settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        <span>設定</span>
      </button>
    </nav>
  </div>

  <div id="modalRoot"></div>
  <script>
    window.__TENMAN_DISPATCH_URL = "https://script.google.com/macros/s/AKfycby5MoObvujeXpiSmS-6KW4ABVP3T2zvu9BHHNEWOSGdGAf3BypNALW0r5CD3yBjSnPoJg/exec?path=api/dispatch";
  </script>
  <script type="module" src="./app.js"></script>
</body>
</html>
