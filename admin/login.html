<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン - 占いサロン予約管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body data-page="login" class="login-page">
  <main class="login-layout">
    <section class="login-panel" aria-labelledby="loginTitle">
      <div class="login-brand">
        <p class="brand-kicker">tenman admin</p>
        <h1 id="loginTitle">占いサロン予約管理</h1>
        <p>登録済みメールアドレスとパスワードでログインしてください。</p>
      </div>

      <form class="login-form" id="loginForm" novalidate>
        <label class="login-field">
          <span>メールアドレス</span>
          <input type="email" id="loginEmail" name="email" autocomplete="email" required>
        </label>
        <label class="login-field">
          <span>パスワード</span>
          <input type="password" id="loginPassword" name="password" autocomplete="current-password" required>
        </label>
        <button type="submit" class="btn btn-primary" id="loginSubmitButton">ログイン</button>
        <button type="button" class="link-button" id="forgotPasswordButton">パスワードを忘れた場合</button>
        <p class="login-status" id="loginStatus" role="status" aria-live="polite"></p>
        <p class="reset-message" id="resetMessage" role="status" aria-live="polite" hidden></p>
        <p class="error-message" id="loginError" role="alert" hidden></p>
      </form>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
