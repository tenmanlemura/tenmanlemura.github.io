<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>空き状況 — 占い日より天満／太宰府・占い日よりLEMURA／久留米</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Shippori+Mincho:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#2BB1C7; --teal2:#1E9AAF; --teal-lt:#5BC5D4;
  --teal-pale:#B6E4EA; --teal-bg:#EAF2F5;
  --bg:#F5FAFB; --bgMist:#DCE8EB; --surface:#FFFFFF;
  --fg1:#333; --fg2:#33404B; --fg3:#6A7480; --border:#B5C0C8;
  --serif:'Shippori Mincho',serif;
  --sans:'Noto Sans JP',-apple-system,sans-serif;
  --mono:'JetBrains Mono','SF Mono',Menlo,monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--fg1);font-family:var(--sans);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}

.wrap{width:100%;max-width:560px;margin:0 auto;padding:0 12px}

/* Header */
.site-header{background:var(--teal);padding:18px 0}
.header-inner{display:flex;align-items:center;gap:12px;padding:0 16px}
.header-name{font-family:var(--serif);font-size:17px;color:#fff;font-weight:500;letter-spacing:0.06em;line-height:1.45}
.header-name + .header-name{margin-top:1px}
.header-name .loc{font-size:0.72em;opacity:0.82;letter-spacing:0.02em;margin-left:1px}
.header-sub{font-size:11px;color:var(--teal-pale);letter-spacing:0.25em;text-transform:uppercase;margin-top:5px}

/* Course */
.course-panel{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 0}
.course-title{font-size:11px;letter-spacing:0.25em;color:var(--teal2);font-weight:500;text-align:center;margin-bottom:10px}
.course-list{display:flex;justify-content:center;gap:24px;flex-wrap:wrap}
.course-item{display:flex;align-items:baseline;gap:8px}
.course-time{font-family:var(--serif);font-size:17px;color:var(--fg1);font-weight:500}
.course-price{font-size:14px;color:var(--fg2)}

/* Legend */
.legend{padding:14px 0 14px;display:flex;justify-content:center;gap:18px;flex-wrap:wrap;font-size:13px;color:var(--fg2)}
.legend-item{display:inline-flex;align-items:center;gap:5px}
.legend-icon{font-family:var(--serif);font-weight:700;font-size:18px}
.legend-icon.open{color:var(--teal2);font-family:var(--sans);font-weight:900}
.legend-icon.none{color:#3F4B57;font-weight:400;font-size:16px}

/* Week nav */
.week-nav{padding:4px 0 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.week-nav .label{flex:1;text-align:center;font-family:var(--serif);font-size:17px;color:var(--teal2);font-weight:500;letter-spacing:0.04em;line-height:1.35}
.week-nav .label .wk-year{display:block;font-size:13px;font-weight:500;letter-spacing:0.02em;opacity:.85}
.nav-btn{flex-shrink:0;background:transparent;border:none;color:var(--teal2);padding:6px 10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.nav-btn:disabled{color:var(--fg3);cursor:not-allowed}
.today-btn{flex-shrink:0;background:var(--teal-bg);border:1px solid var(--teal-lt);color:var(--teal2);padding:5px 12px;border-radius:999px;font-size:11px;font-weight:500;cursor:pointer}

/* Grid */
.cal-wrap{padding:0 0 28px}
.cal{border:1px solid var(--border);border-radius:6px;background:var(--surface);min-height:200px}

.cal-head{display:grid;grid-template-columns:42px repeat(7,1fr);background:var(--bgMist);position:sticky;top:0;z-index:5;border-top-left-radius:5px;border-top-right-radius:5px;box-shadow:0 1px 0 var(--border)}
.cal-head-time{padding:8px 1px;text-align:center;font-size:11px;color:var(--fg2);border-right:1px solid var(--border);line-height:1.2;font-weight:500}
.cal-head-day{padding:7px 2px;text-align:center;line-height:1.3;border-right:1px solid var(--border);font-size:12px;color:var(--fg2)}
.cal-head-day:last-child{border-right:none}
.cal-head-day .d-num{font-weight:700;font-size:15px;color:var(--fg1);display:block}
.cal-head-day .d-wd{font-size:11px;display:block;margin-top:1px}
.cal-head-day .d-wd.sun{color:#EF4444}
.cal-head-day .d-wd.sat{color:#3B82F6}
.cal-head-day.is-today .d-num{color:var(--teal);text-decoration:underline;text-underline-offset:2px}
.cal-head-day .store-badge{display:inline-block;margin-top:2px;font-size:9px;font-weight:700;color:#fff;background:var(--teal2);border-radius:3px;padding:1px 5px;line-height:1.4}
.cal-head-day .event-badge{display:inline-block;margin-top:2px;font-size:9px;font-weight:700;color:#fff;background:#7A5AB0;border-radius:3px;padding:1px 5px;line-height:1.4}
.cal-head-day .closed-badge{display:inline-block;margin-top:2px;font-size:9px;font-weight:700;color:#fff;background:#8A94A6;border-radius:3px;padding:1px 5px;line-height:1.4}

.cal-row{display:grid;grid-template-columns:42px repeat(7,1fr);border-top:1px solid var(--border)}
.cal-row.alt{background:var(--bg)}
.cal-time{padding:0 1px;text-align:center;font-family:var(--mono);font-size:12px;color:var(--fg2);font-weight:500;border-right:1px solid var(--border);display:flex;align-items:center;justify-content:center;min-height:46px}
.cal-cell{padding:0;text-align:center;font-family:var(--serif);font-weight:700;border-right:1px solid var(--border);line-height:1;display:flex;align-items:center;justify-content:center;min-height:46px}
.cal-cell:last-child{border-right:none}
.cal-cell.open{color:var(--teal2);font-size:22px;font-family:var(--sans);font-weight:900}
.cal-cell.none{color:#3F4B57;font-weight:400;font-size:22px}

.event-name-bar{padding:10px 14px;background:#F5F0FB;color:#5C3D9A;font-size:12px;text-align:center;border-top:1px solid #E8DCF2}

/* Loading / Error */
.status-bar{padding:32px 16px;text-align:center;font-size:13px;color:var(--fg2)}
.status-bar.error{color:#B45A5A}
.status-bar .retry-btn{margin-top:10px;background:var(--teal-bg);border:1px solid var(--teal-lt);color:var(--teal2);padding:6px 16px;border-radius:999px;font-size:12px;cursor:pointer;font-family:inherit}

/* Note / footer */
.note-bar{background:var(--teal-bg);border-top:1px solid var(--border);padding:18px 0;margin-top:8px}
.note-inner{font-size:14px;color:var(--fg2);line-height:1.85;text-align:center}
.note-inner strong{color:var(--teal2)}
.site-footer{text-align:center;padding:22px 0 32px;font-size:12px;color:var(--fg3)}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <svg width="30" height="30" viewBox="0 0 64 64" fill="none" aria-hidden="true">
      <path d="M32 10 C18 20, 16 38, 24 56 C38 52, 50 40, 50 22 C44 16, 38 11, 32 10 Z" fill="rgba(255,255,255,0.88)"/>
      <path d="M32 10 C32 24, 30 38, 24 56" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" fill="none"/>
    </svg>
    <div>
      <div class="header-name">占い日より天満<span class="loc">／太宰府</span></div>
      <div class="header-name">占い日よりLEMURA<span class="loc">／久留米</span></div>
      <div class="header-sub">空き状況</div>
    </div>
  </div>
</header>

<section class="course-panel" aria-label="鑑定コース">
  <div class="wrap">
    <div class="course-title">鑑定コース</div>
    <div class="course-list" id="courseList">
      <div class="course-item"><span class="course-time">60分</span><span class="course-price">¥9,000</span></div>
      <div class="course-item"><span class="course-time">80分</span><span class="course-price">¥12,000</span></div>
    </div>
  </div>
</section>

<div class="wrap">
  <div class="legend" aria-label="記号の意味">
    <span class="legend-item"><span class="legend-icon open">○</span> 空きあり</span>
    <span class="legend-item"><span class="legend-icon none">×</span> 予約不可</span>
    <span class="legend-item">田 = 田主丸店 / 太 = 太宰府店</span>
  </div>

  <nav class="week-nav" aria-label="週ナビゲーション">
    <button class="nav-btn" id="btnPrev">◀ 前の週</button>
    <span class="label" id="weekLabel"></span>
    <button class="today-btn" id="btnToday">今週</button>
    <button class="nav-btn" id="btnNext">次の週 ▶</button>
  </nav>

  <div class="cal-wrap">
    <div class="cal" id="cal" role="table" aria-label="空き状況カレンダー">
      <div class="status-bar" id="statusBar">読み込み中…</div>
    </div>
    <div id="eventBars"></div>
  </div>
</div>

<div class="note-bar">
  <div class="wrap">
    <p class="note-inner">
      この画面は空き状況の確認のみできます。<br>
      ご予約は <strong>LINE公式アカウント</strong> からお問い合わせください。<br>
      お名前・希望日時・店舗を一緒にお送りいただくとスムーズです。
    </p>
  </div>
</div>

<footer class="site-footer">
  <div class="wrap">
    占い日より天満<span style="font-size:0.78em;opacity:0.82">／太宰府</span><br>
    占い日よりLEMURA<span style="font-size:0.78em;opacity:0.82">／久留米</span>
  </div>
</footer>

<script>
// ── 設定 ─────────────────────────────────────────────
const STORE_LABELS = { tanushimaru:"田主丸", dazaifu:"太宰府" };
const STORE_SHORT  = { tanushimaru:"田",    dazaifu:"太" };
const WDAYS = ["日","月","火","水","木","金","土"];

// ── ユーティリティ ─────────────────────────────────
function dateKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function weekMonday(d){const r=new Date(d);const day=r.getDay();r.setDate(r.getDate()-(day===0?6:day-1));r.setHours(0,0,0,0);return r;}
function fmtWeek(mon){const sun=new Date(mon);sun.setDate(sun.getDate()+6);const y=mon.getFullYear();const m1=mon.getMonth()+1,d1=mon.getDate();const m2=sun.getMonth()+1,d2=sun.getDate();const range=m1===m2?`${m1}月${d1}日〜${d2}日`:`${m1}月${d1}日〜${m2}月${d2}日`;return `<span class="wk-year">${y}年</span>${range}`;}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));}

// ── 空き状況取得（3 段 fallback） ───────────────────
// (1) VPS live API（最新データ・2.5s timeout）
// (2) GitHub Pages 上の静的 JSON（同一 origin・数十 ms 目標）
// (3) localStorage stale（24h 以内なら一旦表示）
const LIVE_API_URL = "https://tenmanlemura.com/api/public/availability";
const LIVE_API_TIMEOUT_MS = 2500;
const STATIC_JSON_BASE = "./data/weeks";
const LOCAL_CACHE_PREFIX = "tenman:availability:v1:";
const LOCAL_CACHE_MAX_AGE_MS = 86400000; // 24h

async function fetchAvailability(weekStartKey) {
  const t0 = (typeof performance !== "undefined" && performance.now) ? performance.now() : Date.now();

  // (1) VPS live API を優先取得
  try {
    const data = await fetchFromLiveApi(weekStartKey);
    if (data && Array.isArray(data.days) && data.days.length === 7) {
      try { localStorage.setItem(LOCAL_CACHE_PREFIX + weekStartKey, JSON.stringify({ data: data, fetchedAt: Date.now() })); } catch (e) {}
      try { console.log(`[perf] live API ${weekStartKey}: ${Math.round((((typeof performance!=="undefined"&&performance.now)?performance.now():Date.now())-t0))}ms`); } catch(e) {}
      return data;
    }
  } catch (e) { /* fall through */ }

  // (2) 静的 JSON fallback
  try {
    const url = `${STATIC_JSON_BASE}/${encodeURIComponent(weekStartKey)}.json?v=${Date.now()}`;
    const res = await fetch(url, { cache: "no-store" });
    if (res.ok) {
      const data = await res.json();
      try { localStorage.setItem(LOCAL_CACHE_PREFIX + weekStartKey, JSON.stringify({ data: data, fetchedAt: Date.now() })); } catch (e) {}
      try { console.log(`[perf] static JSON ${weekStartKey}: ${Math.round((((typeof performance!=="undefined"&&performance.now)?performance.now():Date.now())-t0))}ms`); } catch(e) {}
      return data;
    }
  } catch (e) { /* fall through */ }

  // (3) localStorage stale fallback（24h 以内なら一旦表示）
  try {
    const cached = localStorage.getItem(LOCAL_CACHE_PREFIX + weekStartKey);
    if (cached) {
      const parsed = JSON.parse(cached);
      if (parsed && parsed.fetchedAt && (Date.now() - parsed.fetchedAt) < LOCAL_CACHE_MAX_AGE_MS) {
        try { console.log(`[perf] localStorage stale ${weekStartKey}: ${Math.round((((typeof performance!=="undefined"&&performance.now)?performance.now():Date.now())-t0))}ms`); } catch(e) {}
        return parsed.data;
      }
    }
  } catch (e) { /* fall through */ }

  throw new Error("availability unavailable");
}

async function fetchFromLiveApi(weekStartKey) {
  const url = new URL(LIVE_API_URL);
  url.searchParams.set("start", weekStartKey);
  url.searchParams.set("weeks", "1");

  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), LIVE_API_TIMEOUT_MS);
  try {
    const res = await fetch(url.toString(), {
      cache: "no-store",
      headers: { accept: "application/json" },
      signal: controller.signal,
    });
    if (!res.ok) return null;
    const payload = await res.json();
    return normalizeLiveAvailability(payload, weekStartKey);
  } finally {
    clearTimeout(timeoutId);
  }
}

function normalizeLiveAvailability(payload, weekStartKey) {
  if (!payload || typeof payload !== "object" || Array.isArray(payload)) return null;
  if (payload.start !== weekStartKey || payload.weeks !== 1) return null;
  if (!Number.isFinite(payload.slot_duration_min)) return null;
  if (!Array.isArray(payload.courses)) return null;
  if (!Array.isArray(payload.days) || payload.days.length !== 7) return null;

  const startDate = parseDateKeyUtc(weekStartKey);
  if (!startDate) return null;

  for (let i = 0; i < payload.days.length; i++) {
    const day = payload.days[i];
    const expectedDate = fmtDateKeyUtc(addDaysUtc(startDate, i));
    if (!day || typeof day !== "object" || Array.isArray(day)) return null;
    if (day.date !== expectedDate) return null;
    if (typeof day.day_status !== "string" || day.day_status === "") return null;
    if (!Object.prototype.hasOwnProperty.call(day, "location_code")) return null;
    if (!Array.isArray(day.slots)) return null;
  }

  return {
    week_start: weekStartKey,
    courses: payload.courses,
    days: payload.days,
  };
}

function parseDateKeyUtc(value) {
  const match = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(value || ""));
  if (!match) return null;
  const year = Number.parseInt(match[1], 10);
  const month = Number.parseInt(match[2], 10);
  const day = Number.parseInt(match[3], 10);
  const date = new Date(Date.UTC(year, month - 1, day));
  if (date.getUTCFullYear() !== year || date.getUTCMonth() !== month - 1 || date.getUTCDate() !== day) return null;
  return date;
}

function addDaysUtc(date, days) {
  const next = new Date(date.getTime());
  next.setUTCDate(next.getUTCDate() + days);
  return next;
}

function fmtDateKeyUtc(date) {
  return date.toISOString().slice(0, 10);
}

// ── レンダリング ────────────────────────────────────
let weekStart = weekMonday(new Date());
let currentDays = {}; // weekStartKey → { day_status, location_code, slots, ... }
let coursesCache = null;

function showStatus(msg, isError) {
  document.getElementById("cal").innerHTML =
    `<div class="status-bar${isError ? " error" : ""}">${escapeHtml(msg)}` +
    (isError ? `<br><button class="retry-btn" onclick="loadAndRender()">再試行</button>` : "") +
    `</div>`;
  document.getElementById("eventBars").innerHTML = "";
}

function renderCourses(courses) {
  if (!courses || !courses.length) return;
  const html = courses.map(c =>
    `<div class="course-item"><span class="course-time">${escapeHtml(String(c.duration_min))}分</span>` +
    `<span class="course-price">¥${Number(c.price).toLocaleString("ja-JP")}</span></div>`
  ).join("");
  document.getElementById("courseList").innerHTML = html;
}

function buildTimeAxis(days) {
  // days[].slots から開始時刻の和集合を取り、時刻順にソート
  const set = new Set();
  days.forEach(({ data }) => {
    if (!data || !data.slots) return;
    data.slots.forEach(s => set.add(s.start));
  });
  return Array.from(set).sort();
}

function render() {
  const todayKey = dateKey(new Date());
  document.getElementById("weekLabel").innerHTML = fmtWeek(weekStart);

  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    const key = dateKey(d);
    days.push({ key, date: d, data: currentDays[key] || null });
  }

  const times = buildTimeAxis(days);
  if (times.length === 0) {
    const hasClosed = days.some(d => d.data && d.data.day_status === "closed");
    showStatus(hasClosed ? "この週はお休みをいただいています" : "この週の営業時間帯が設定されていません", false);
    return;
  }

  let html = `<div class="cal-head">`;
  html += `<div class="cal-head-time">時間</div>`;
  days.forEach(({ key, date, data }) => {
    const wd = date.getDay();
    const wdCls = wd === 0 ? "sun" : wd === 6 ? "sat" : "";
    const isToday = key === todayKey;
    const todayCls = isToday ? " is-today" : "";

    let badge = "";
    if (data) {
      if (data.day_status === "event") {
        badge = `<span class="event-badge">イベント</span>`;
      } else if (data.day_status === "closed") {
        badge = `<span class="closed-badge">店休</span>`;
      } else if (data.location_code) {
        badge = `<span class="store-badge">${STORE_SHORT[data.location_code] || ""}</span>`;
      }
    }

    html += `<div class="cal-head-day${todayCls}">
      <span class="d-num">${date.getDate()}</span>
      <span class="d-wd ${wdCls}">(${WDAYS[wd]})</span>
      ${badge}
    </div>`;
  });
  html += `</div>`;

  times.forEach((t, ti) => {
    const altCls = ti % 2 === 1 ? " alt" : "";
    html += `<div class="cal-row${altCls}">`;
    html += `<div class="cal-time">${escapeHtml(t)}</div>`;
    days.forEach(({ data }) => {
      if (!data || data.day_status === "event" || data.day_status === "closed") {
        html += `<div class="cal-cell none">×</div>`;
        return;
      }
      const slot = (data.slots || []).find(s => s.start === t);
      if (!slot) {
        html += `<div class="cal-cell none">×</div>`;
      } else if (slot.status === "open") {
        html += `<div class="cal-cell open">○</div>`;
      } else {
        html += `<div class="cal-cell none">×</div>`;
      }
    });
    html += `</div>`;
  });

  document.getElementById("cal").innerHTML = html;

  const evBars = document.getElementById("eventBars");
  evBars.innerHTML = "";
  const events = days.filter(d => d.data && d.data.day_status === "event" && d.data.event_name);
  const seen = new Set();
  events.forEach(({ data }) => {
    if (seen.has(data.event_name)) return;
    seen.add(data.event_name);
    const bar = document.createElement("div");
    bar.className = "event-name-bar";
    const venue = data.event_venue ? `（${escapeHtml(data.event_venue)}）` : "";
    bar.innerHTML = `<strong>イベント出店：</strong>${escapeHtml(data.event_name)}${venue}`;
    evBars.appendChild(bar);
  });
}

async function loadAndRender() {
  showStatus("読み込み中…", false);
  const weekKey = dateKey(weekStart);
  try {
    const resp = await fetchAvailability(weekKey);
    if (!resp || resp.ok === false) {
      const errMsg = (resp && resp.error) ? resp.error : "サーバーから応答がありません";
      showStatus("エラー：" + errMsg, true);
      return;
    }
    currentDays = {};
    (resp.days || []).forEach(d => { currentDays[d.date] = d; });
    if (resp.courses) {
      coursesCache = resp.courses;
      renderCourses(resp.courses);
    }
    render();
  } catch (err) {
    const reason = err && err.message ? err.message : "unknown";
    showStatus("通信エラー（" + reason + "）。電波状況をご確認ください。", true);
  }
}

document.getElementById("btnPrev").addEventListener("click", () => {
  weekStart.setDate(weekStart.getDate() - 7); loadAndRender();
});
document.getElementById("btnNext").addEventListener("click", () => {
  weekStart.setDate(weekStart.getDate() + 7); loadAndRender();
});
document.getElementById("btnToday").addEventListener("click", () => {
  weekStart = weekMonday(new Date()); loadAndRender();
});

loadAndRender();
</script>
</body>
</html>
